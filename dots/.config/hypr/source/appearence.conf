env = GTK_THEME,AxMat
exec = hyprctl setcursor "Bibata-Modern-Classic" 24

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

source = ~/.config/hypr/source/colors.conf
general {
    col.active_border = rgb($primary)
    col.inactive_border = rgb($surface)
    border_size = 2
    layout = dwindle
    gaps_in = 2
    gaps_out = 4
}

decoration {
  dim_special = 0.8
  dim_inactive = true
  dim_strength = 0.05

  blur {
      enabled = yes
      size = 1
      passes = 3
      new_optimizations = yes
      contrast = 1
      brightness = 1
  }
  rounding = 14
  shadow {
    enabled = true
    range = 10
    render_power = 2
    color = rgba(0, 0, 0, 0.25)
  }
}
