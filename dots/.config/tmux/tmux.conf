set-environment -g PATH "/usr/local/bin:/bin:/usr/bin"

set-option -g default-terminal 'xterm-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'
set -g status-position top
set -g status-format[1] " "
set -g status 2
set -g mouse on

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off

bind -n M-H previous-window
bind -n M-L next-window

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set-window-option -g mode-keys vi

# Theme: borders
# set -g pane-border-status top
set -g pane-border-lines single
set -g pane-border-style fg=colour8
set -g pane-active-border-style fg=colour4

# Theme: status
set -g status-style bg=default,fg=brightblack
set -g @round-separator-style-prefix fg=colour1,bg=colour19
set -g @round-separator-style fg=colour16,bg=colour19
set -g @left-text-style-prefix fg=colour8,bg=colour1
set -g @left-text-style fg=colour8,bg=colour16
set -g status-left "#[#{?client_prefix,#{@round-separator-style-prefix},#{@round-separator-style}}]#[#{?client_prefix,#{@left-text-style-prefix},#{@left-text-style}}]󰣇 #{pane_current_command}#[#{?client_prefix,#{@round-separator-style-prefix},#{@round-separator-style}}]#[bg=colour19]  "
set -g status-left-length "30"
set -g status-right "#[fg=colour18]%H:%M  "

# Theme: status (windows)
set -g window-status-format "#{window_name}"
set -g window-status-current-format "#[fg=colour16]#{?window_zoomed_flag,*}#{window_name}"
set -g window-status-current-style "fg=colour16"
set -g window-status-bell-style "fg=red,nobold"
set -g status-justify left

bind-key -n C-y copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-seleciton
bind-key -T copy-mode-vi Escape send-keys -X cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind -n C-t run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

bind -n C-w run-shell "sesh window | fzf-tmux -p 60%,50% --prompt '🪟  ' | xargs -I {} -r sesh window {}"

run '~/.tmux/plugins/tpm/tpm'
